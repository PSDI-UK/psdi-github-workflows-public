name: Tag and push container
run-name: Tag and push container

on:
  workflow_call:
    inputs:
      service_name:
        description: "The name of the service being deployed, e.g. 'psdi_organic_toolkit'"
        required: true
        type: string
      container_tag:
        description: "The latest tag for the container"
        required: true
        type: string
      rel_url_path:
        description: "If the site isn't to be deployed at the root URL of the site, the URL it will be deployed at relative to the root, e.g. '/variability'"
        required: false
        default: ""
        type: string

jobs:
  container-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup docker auth
        run: |
          mkdir -p ~/.docker
          cat <<EOF > ~/.docker/config.json
          {
            "auths": {
              "ghcr.io": {
                "auth": "$(echo -n "$GIT_USERNAME:$GIT_PASSWORD" | base64 -w0)"
              }
            }
          }
          EOF
        env: # needed to authenticate to github and download the repo
          GIT_USERNAME: ${{ github.actor }}
          GIT_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker build API
        env:
          IMAGE_NAME: "ghcr.io/psdi-uk/${{ inputs.service_name }}/${{ inputs.service_name }}:${{ inputs.container_tag }}"
        run: |
          SHA=`git log -n 1 | head -n 1 | awk '{print($2)}'`
          TAG=`git tag --sort -version:refname | head -n 1`
          TAG_SHA=`git show $TAG | head -n 1 | awk '{print($2)}'`
          DATE=`git log -n 1 --pretty=reference | head -n 1 | gawk '{print($NF)}' \
                | gawk '{print substr($0, 1, length($0)-1)}'`
          REL_URL_PATH=${{ inputs.rel_url_path }}
          echo "Building with TAG=$TAG, TAG_SHA=$TAG_SHA, SHA=$SHA, DATE=$DATE, REL_URL_PATH=$REL_URL_PATH"
          docker build \
            --build-arg SHA=$SHA \
            --build-arg TAG=$TAG \
            --build-arg TAG_SHA=$TAG_SHA \
            --build-arg DATE=$DATE \
            --build-arg REL_URL_PATH=$REL_URL_PATH \
            -t $IMAGE_NAME .
          docker push $IMAGE_NAME
