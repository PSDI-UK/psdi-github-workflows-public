# Reusable workflow intended to be called as a job from an external repo to trigger
# deployment of the service to STFC infrastructure.

name: Trigger deployment
run-name: trigger-deployment
on:
  workflow_call:
    inputs:
      deployment_repo:
        description: "The name of the repo used for deployment of this repo"
        required: true
        type: string
      environment:
        description: "Environment to deploy to (development, staging or production)"
        required: true
        type: string
      container_tag:
        description: "Tag for the service container to deploy"
        required: true
        type: string
    secrets:
      deployment_app_id:
        description: "ID of GitHub app used for authentication"
        required: true
      deployment_app_private_key:
        description: "Private key of GitHub app used for authentication"
        required: true

jobs:
  trigger-and-wait:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.deployment_app_id }}
          private-key: ${{ secrets.deployment_app_private_key }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ inputs.deployment_repo }}

      - name: Trigger deployment workflow
        id: trigger
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api /repos/PSDI-UK/${{ inputs.deployment_repo }}/dispatches \
            --method POST \
            --field event_type=deploy \
            --field client_payload[tag]=${{ inputs.container_tag }} \
            --field client_payload[ref]=${{ github.ref }} \
            --field client_payload[repo]=${{ github.repository }} \
            --field client_payload[env]=${{ inputs.environment }}

          echo "✅ Deployment triggered successfully"
          echo "Tag: ${{ inputs.container_tag }}"
          echo "Ref: ${{ github.ref }}"
          echo "Env: ${{ inputs.environment }}"

          # Store trigger time for polling
          TRIGGER_TIME=$(date -u +%s)
          echo "trigger_time=$TRIGGER_TIME" >> $GITHUB_OUTPUT
          echo "Trigger time: $(date -u -d @$TRIGGER_TIME '+%Y-%m-%d %H:%M:%S UTC')"

      - name: Wait for deployment to complete
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TRIGGER_TIME: ${{ steps.trigger.outputs.trigger_time }}
          DEPLOY_REPO: "PSDI-UK/${{ inputs.deployment_repo }}"
          WORKFLOW_FILE: "ci-deploy.yml"
        run: |
          TIMEOUT=1800  # 30 minutes timeout
          POLL_INTERVAL=15  # Check every 15 seconds
          ELAPSED=0
          FOUND_RUN=false

          echo "⏳ Waiting for deployment workflow to start and complete..."
          echo "Timeout: ${TIMEOUT}s ($(($TIMEOUT / 60)) minutes)"

          while [ $ELAPSED -lt $TIMEOUT ]; do
            # Get workflow runs triggered by repository_dispatch after our trigger time
            RUNS=$(gh api \
              "/repos/$DEPLOY_REPO/actions/workflows/$WORKFLOW_FILE/runs?per_page=10" \
              --jq "[.workflow_runs[] | select(.event == \"repository_dispatch\" and (.created_at | fromdateiso8601) >= $TRIGGER_TIME)] | sort_by(.created_at) | reverse | .[0]" \
              2>/dev/null) || true
            
            if [ -n "$RUNS" ] && [ "$RUNS" != "null" ] && [ "$RUNS" != "" ]; then
              FOUND_RUN=true
              STATUS=$(echo "$RUNS" | jq -r .status)
              CONCLUSION=$(echo "$RUNS" | jq -r .conclusion)
              RUN_ID=$(echo "$RUNS" | jq -r .id)
              RUN_NUMBER=$(echo "$RUNS" | jq -r .run_number)
              
              echo "📊 Deployment workflow #$RUN_NUMBER - Status: $STATUS, Conclusion: $CONCLUSION"
              
              if [ "$STATUS" = "completed" ]; then
                echo ""
                echo "🔗 Deployment run: https://github.com/$DEPLOY_REPO/actions/runs/$RUN_ID"
                
                if [ "$CONCLUSION" = "success" ]; then
                  echo "✅ Deployment completed successfully!"
                  exit 0
                elif [ "$CONCLUSION" = "failure" ]; then
                  echo "❌ Deployment failed"
                  exit 1
                elif [ "$CONCLUSION" = "cancelled" ]; then
                  echo "❌ Deployment was cancelled"
                  exit 1
                elif [ "$CONCLUSION" = "skipped" ]; then
                  echo "⚠️ Deployment was skipped"
                  exit 1
                else
                  echo "❌ Deployment completed with unexpected conclusion: $CONCLUSION"
                  exit 1
                fi
              fi
            elif [ "$FOUND_RUN" = false ]; then
              echo "⏳ Waiting for deployment workflow to start... (${ELAPSED}s elapsed)"
            else
              echo "⏳ Deployment in progress... (${ELAPSED}s elapsed)"
            fi
            
            sleep $POLL_INTERVAL
            ELAPSED=$((ELAPSED + POLL_INTERVAL))
          done

          echo ""
          echo "❌ Timeout: Deployment did not complete within ${TIMEOUT}s"

          if [ "$FOUND_RUN" = true ]; then
            echo "🔗 Check deployment status: https://github.com/$DEPLOY_REPO/actions/workflows/$WORKFLOW_FILE"
          else
            echo "⚠️ Warning: No deployment workflow run was detected. Check repository_dispatch was received."
          fi

          exit 1
