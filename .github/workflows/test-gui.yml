name: Test GUI
run-name: Test GUI

on:
  workflow_call:
    inputs:
      simple:
        description: "If true, will only run a single test conversion"
        required: false
        default: false
        type: boolean
      prod:
        description: "If true, will run test on the deployed site instead of local"
        required: false
        default: false
        type: boolean
      origin:
        description: "If prod=true, the address of the deployed site to test on (unused if prod=false)"
        required: false
        default: "null"
        type: string

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up Firefox
        uses: browser-actions/setup-firefox@v1
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[gui-test]
      - name: Run GUI tests
        if: ${{ ! inputs.simple }}
        run: |
          if ${{ inputs.prod }}; then
            export ORIGIN=${{ inputs.origin }}
          fi
          export GH_TOKEN=${{ github.token }}
          pytest tests/gui
      - name: Run simple GUI test
        if: ${{ inputs.simple }}
        run: |
          if ${{ inputs.prod }}; then
            export ORIGIN=${{ inputs.origin }}
          fi
          export GH_TOKEN=${{ github.token }}
          pytest 'tests/gui/gui_test.py::test_initial_frontpage'
