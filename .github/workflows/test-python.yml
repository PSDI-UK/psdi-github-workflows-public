#       test_on_mac: true

name: Test Python
run-name: Test Python

on:
  workflow_call:
    inputs:
      source_dir:
        description: "The directory within the project containing the Python source code"
        required: true
        type: string
      test_on_mac:
        description: "Whether or not to additionally run tests on macos-latest"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.secondary }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        secondary: [false]
        include:
          - os: [macos-latest]
            if: ${{ inputs.test_on_mac }}
            secondary: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install .[test]

      - name: Test non-GUI code with pytest
        run: |
          pytest tests/python
          # Save coverage report to coverage.json

      - name: Lint with flake8
        if: ${{ ! matrix.secondary }}
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 tests ${{ inputs.source_dir }} --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings
          flake8 tests ${{ inputs.source_dir }} --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Test building the package
        run: |
          pip install build
          python -m build
