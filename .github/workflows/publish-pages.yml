# Render and deploy static content to GitHub Pages (the repository must be set up to allow workflow deployment to Pages)

# Sample workflow content to call this:
#
# on:
#   workflow_dispatch:
#   push:
#     branches: ["feature**"]
#
# jobs:
#   (tests)
#
#   deploy-pages:
#     uses: PSDI-UK/psdi-github-workflows-public/.github/workflows/publish-pages.yml@VERSION
#     with:
#       environment: github-pages
#       render-command: PROJECT_NAME_HYPHEN-render --service-mode

name: Deploy static content to Pages
run-name: Deploy Pages

on:
  workflow_call:
    inputs:
      environment:
        description: "Environment to be used for deployment"
        required: false
        default: "github-pages"
        type: string
      render_command:
        description: "Command to render content to be deployed"
        required: true
        type: string

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: ${{ inputs.environment }}
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Render Static Content
        run: ${{ inputs.render_command }}

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "public"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
